x-router-app: &router-app
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment:
    LLM_ROUTER_CONFIG: config/config.compose.yaml
    LLM_ROUTER_API_KEYS: ${LLM_ROUTER_API_KEYS:-dev-api-key}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  volumes:
    - ./logs:/app/logs
    - ./data:/app/data
    - ./config:/app/config:ro
  restart: unless-stopped

services:
  redis:
    image: redis:7.4-alpine
    container_name: slack-llm-router-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis-stack:
    image: redis/redis-stack-server:latest
    container_name: slack-llm-router-redis-stack
    ports:
      - "6380:6379"
    volumes:
      - redis_stack_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: slack-llm-router-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: slack-llm-router-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: llm_router
      CLICKHOUSE_PASSWORD: llm_router_pass
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user llm_router --password llm_router_pass --query 'SELECT 1'"]
      interval: 10s
      timeout: 10s
      retries: 12

  api:
    <<: *router-app
    container_name: slack-llm-router-api
    command: ["python", "main.py", "start-api", "--config", "config/config.compose.yaml"]
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12

  workers:
    <<: *router-app
    container_name: slack-llm-router-workers
    command: ["python", "main.py", "start-workers", "--config", "config/config.compose.yaml"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  flink-jobmanager:
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    container_name: slack-llm-router-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    volumes:
      - ./:/workspace
    depends_on:
      kafka:
        condition: service_healthy

  flink-taskmanager:
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    container_name: slack-llm-router-flink-taskmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    volumes:
      - ./:/workspace
    depends_on:
      flink-jobmanager:
        condition: service_started

volumes:
  redis_data:
  redis_stack_data:
  clickhouse_data:
