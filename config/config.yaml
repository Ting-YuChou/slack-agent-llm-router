api:
  host: 0.0.0.0
  port: 8080
  log_level: info
  cors_origins:
  - '*'
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst_size: 100
logging:
  level: INFO
  file: logs/llm_router.log
  max_bytes: 10485760
  backup_count: 5
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
router:
  default_model: gpt-5
  routing_strategy: intelligent
  fast_lane_models:
  - mistral-7b
  scoring:
    reliability_weight: 40
    latency_weight: 20
    cost_weight_cap: 20
    priority_weight: 2
    context_fit_full_weight: 10
    context_fit_partial_weight: 5
    default_model_bonus: 4
    gpt5_default_bonus: 3
    sonnet_enterprise_bonus: 12
    sonnet_difficult_task_bonus: 10
    difficult_task_token_threshold: 50000
    local_simple_task_bonus: 12
    simple_task_token_threshold: 1200
    local_simple_task_types:
    - general
    - summarization
    - brainstorming
    - planning
    - translation
    - question_answering
  models:
    gpt-5:
      provider: openai
      api_key_env: OPENAI_API_KEY
      max_tokens: 128000
      cost_per_token: 3.0e-05
      priority: 2
      capabilities:
      - general
      - reasoning
      - coding
      - analysis
      - tool_use
      - web_search
    claude-sonnet-4-6:
      provider: anthropic
      api_key_env: ANTHROPIC_API_KEY
      max_tokens: 1000000
      cost_per_token: 1.5e-05
      priority: 1
      capabilities:
      - reasoning
      - writing
      - analysis
      - tool_use
      - web_search
    mistral-7b:
      provider: vllm
      model_path: /models/mistral-7b-instruct
      max_tokens: 8192
      cost_per_token: 1.0e-06
      priority: 3
      capabilities:
      - general
      - coding
      gpu_memory_gb: 16
    llama-3.1-70b:
      provider: vllm
      model_path: /models/llama-3.1-70b-instruct
      max_tokens: 128000
      cost_per_token: 5.0e-06
      priority: 4
      capabilities:
      - reasoning
      - coding
      - analysis
      gpu_memory_gb: 80
  routing_rules:
  - condition: user_tier == 'enterprise'
    models:
    - claude-sonnet-4-6
    - gpt-5
    fallback: claude-sonnet-4-6
  - condition: query_type == 'code_generation'
    models:
    - gpt-5
    - mistral-7b
    fallback: gpt-5
  - condition: query_type == 'analysis' AND token_count > 50000
    models:
    - claude-sonnet-4-6
    - gpt-5
    fallback: claude-sonnet-4-6
  - condition: query_type == 'web_research'
    models:
    - gpt-5
    - claude-sonnet-4-6
    fallback: gpt-5
inference:
  vllm:
    base_url: http://127.0.0.1:8001
    host: localhost
    port: 8001
    worker_use_ray: true
    engine_use_ray: true
    max_model_len: 32768
    gpu_memory_utilization: 0.9
    tensor_parallel_size: 1
    trust_remote_code: true
  openai:
    base_url: https://api.openai.com/v1
    timeout: 60
    max_retries: 3
    prompt_cache:
      enabled: true
      key_strategy: conversation
      retention: in-memory
      pricing:
        cached_input_multiplier: 0.5
  anthropic:
    base_url: https://api.anthropic.com
    timeout: 60
    max_retries: 3
    prompt_cache:
      enabled: true
      cache_control:
        type: ephemeral
      pricing:
        cache_creation_input_multiplier: 1.25
        cache_read_input_multiplier: 0.1
  compression:
    enabled: true
    max_context_tokens: 100000
    compression_ratio: 0.3
    method: semantic_graph
  cache:
    enabled: true
    backend: redis
    ttl: 3600
    max_size: 1GB
    redis:
      host: localhost
      port: 6379
      db: 0
      password_env: REDIS_PASSWORD
  batching:
    enabled: true
    max_batch_size: 32
    max_wait_time_ms: 50
tools:
  web_search:
    enabled: false
    provider: tavily
    api_key_env: TAVILY_API_KEY
    base_url: https://api.tavily.com
    timeout_seconds: 5
    max_results: 5
    per_user_rate_limit: 20
    cache_ttl_seconds: 300
    search_depth: basic
    include_answer: false
    max_results_per_domain: 2
    blocked_domains: []
    freshness_days: 14
kafka:
  bootstrap_servers:
  - localhost:9092
  topics:
    queries: llm-queries
    responses: llm-responses
    metrics: llm-metrics
    requests_raw: requests.raw
    inference_completed: inference.completed
    requests_enriched: requests.enriched
    fast_lane_hints: fast_lane_hints
    analytics_model_metrics_1m: analytics.model_metrics_1m
    routing_guardrails: routing.guardrails
    routing_policy_state: routing.policy_state
    alerts: alerts
    errors: llm-errors
  producer:
    acks: all
    retries: 3
    batch_size: 16384
    linger_ms: 5
    compression_type: gzip
    request_timeout_ms: 40000
    retry_backoff_ms: 100
    send_timeout_seconds: 40
    enable_idempotence: true
    wait_for_ack: true
    raise_on_failure: false
    health_failure_threshold: 5
  consumer:
    group_id: llm-router-consumer
    auto_offset_reset: latest
    enable_auto_commit: false
    max_poll_records: 500
    dlq_enabled: true
    supervisor_initial_backoff_seconds: 1
    supervisor_max_backoff_seconds: 30
  dlq:
    enabled: true
    topic_suffix: .dlq
    send_timeout_seconds: 10
  enabled: false
clickhouse:
  host: localhost
  port: 8123
  database: llm_router
  username: default
  password: ''
  tables:
    queries:
      name: query_logs
      engine: MergeTree
      partition_by: toYYYYMM(timestamp)
      order_by: timestamp
      ttl: timestamp + INTERVAL 90 DAY
    metrics:
      name: system_metrics
      engine: ReplacingMergeTree
      partition_by: toYYYYMMDD(timestamp)
      order_by: (service, metric_name, timestamp)
      ttl: timestamp + INTERVAL 30 DAY
  enabled: false
monitoring:
  prometheus_port: 8000
  prometheus:
    scrape_interval: 15s
    evaluation_interval: 15s
  grafana:
    port: 3000
    admin_user: admin
    admin_password: admin
  alerts:
    error_rate_threshold: 0.05
    latency_threshold_ms: 5000
    memory_usage_threshold: 0.9
    disk_usage_threshold: 0.8
  health_checks:
    interval_seconds: 30
    timeout_seconds: 10
  stream_metrics_staleness_seconds: 300
  enabled: false
slack:
  enabled: false
  bot_token_env: SLACK_BOT_TOKEN
  app_token_env: SLACK_APP_TOKEN
  signing_secret_env: SLACK_SIGNING_SECRET
  channels:
  - general
  - ai-testing
  response_settings:
    max_response_length: 2000
    typing_indicator: true
    thread_replies: true
  rate_limiting:
    requests_per_hour: 100
    burst_requests: 5
    by_tier:
      premium:
        requests_per_hour: 500
        burst_requests: 20
      enterprise:
        requests_per_hour: 2000
        burst_requests: 50
  attachments:
    enabled: true
    max_files: 10
    max_file_size_bytes: 10000000
    download_timeout_seconds: 30
  user_tiers:
    default: free
    overrides: {}
  state_backend: memory
  state_file: queries/slack_state.json
  state_key_prefix: slack_state
  redis:
    host: localhost
    port: 6379
    db: 2
    password_env: REDIS_PASSWORD
  memory:
    enabled: false
    backend: redis_stack
    key_prefix: slack_memory
    max_items_per_user: 500
    retention_days: 365
    search:
      max_results: 5
      max_context_chars: 2000
      max_item_chars: 500
      keyword_weight: 0.45
      vector_weight: 0.45
      recency_weight: 0.05
      importance_weight: 0.05
    embedding:
      provider: openai
      model: text-embedding-3-small
      dimensions: 1536
      timeout: 10
      api_key_env: OPENAI_API_KEY
    redis:
      host: localhost
      port: 6379
      db: 3
      key_prefix: slack_memory
      password_env: REDIS_PASSWORD
      dedicated_service_recommended: true
streamlit:
  enabled: true
  port: 8501
  host: 0.0.0.0
  theme: dark
  dashboard:
    refresh_interval_seconds: 30
    max_log_entries: 1000
    chart_update_interval: 5
flink:
  enabled: false
  job_manager_host: localhost
  job_manager_port: 8081
  parallelism: 4
  checkpointing_interval_ms: 5000
  analytics:
    window_size_seconds: 60
    allowed_lateness_seconds: 15
    rolling_policy_window_seconds: 300
    anomaly_threshold_multiplier: 2.0
    guardrail_threshold_multiplier: 2.0
    watermark_out_of_orderness_seconds: 15
    model_guardrails:
      high_error_rate: 0.3
      high_latency_ms: 5000
      regression_error_rate_floor: 0.15
      regression_latency_floor_ms: 3500
      cache_hit_baseline_min: 0.15
      cache_hit_drop_ratio: 0.5
      cache_hit_min_request_count: 5
      throughput_baseline_min_qps: 0.2
      throughput_drop_ratio: 0.4
      throughput_min_request_count: 3
      cost_spike_ratio: 1.75
    provider_guardrails:
      high_error_rate: 0.2
      high_latency_ms: 6000
      regression_error_rate_floor: 0.1
      regression_latency_floor_ms: 4500
    rolling_policy:
      hot_request_count: 10
      warm_request_count: 4
      complex_total_tokens: 2400
      complex_reasoning_tokens: 1200
      moderate_total_tokens: 900
      moderate_latency_ms: 2500
      moderate_latency_min_tokens: 600
      enterprise_priority_request_count: 4
      burst_request_count: 10
      burst_min_avg_total_tokens: 400
      session_pin_min_success_count: 3
      user_pin_min_success_count: 4
      pin_min_share: 0.6
      expensive_model_min_count: 3
      expensive_model_min_share: 0.7
      free_high_cost_threshold_usd: 0.015
      paid_high_cost_threshold_usd: 0.03
      enterprise_medium_cost_threshold_usd: 0.05
      failing_model_min_count: 2
      failing_model_min_share: 0.6
      failing_provider_min_count: 2
      failing_provider_min_share: 0.7
      fast_lane_hit_rate_threshold: 0.6
policy_cache:
  enabled: false
  request_ttl_seconds: 300
  session_ttl_seconds: 600
  user_ttl_seconds: 900
  guardrail_ttl_seconds: 180
  local_cache_ttl_seconds: 5
  redis:
    host: localhost
    port: 6379
    db: 1
    key_prefix: routing_policy
  consumer:
    group_id: llm-router-policy-materializer
security:
  api_keys:
    enabled: true
    header_name: X-API-Key
    env_var: LLM_ROUTER_API_KEYS
  jwt:
    enabled: false
    secret_key_env: JWT_SECRET_KEY
    algorithm: HS256
    expiration_hours: 24
  cors:
    enabled: true
    allow_origins:
    - '*'
    allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    allow_headers:
    - '*'
performance:
  connection_pools:
    database:
      max_connections: 20
      min_connections: 5
    http:
      max_connections: 100
      timeout: 30
  workers:
    api_workers: 4
    inference_workers: 2
    pipeline_workers: 2
  memory:
    max_heap_size: 8G
    gc_strategy: G1GC
development:
  debug: false
  auto_reload: false
  profiling: false
  mock_external_apis: false
features:
  context_compression: true
  semantic_caching: true
  batch_processing: true
  multi_modal: false
  function_calling: true
  streaming_responses: true
pipeline:
  enabled: false
