api:
  host: 0.0.0.0
  port: 8080
  log_level: info
  cors_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
    - http://localhost:8501
    - http://127.0.0.1:8501

logging:
  level: INFO
  file: logs/llm_router.log
  max_bytes: 10485760
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

router:
  default_model: gpt-5
  routing_strategy: intelligent
  fast_lane_models:
    - gpt-5
  scoring:
    reliability_weight: 40
    latency_weight: 20
    cost_weight_cap: 20
    priority_weight: 2
    context_fit_full_weight: 10
    context_fit_partial_weight: 5
    default_model_bonus: 4
    gpt5_default_bonus: 3
    sonnet_enterprise_bonus: 12
    sonnet_difficult_task_bonus: 10
    difficult_task_token_threshold: 50000
    local_simple_task_bonus: 0
    simple_task_token_threshold: 1200
    local_simple_task_types:
      - general
      - summarization
      - brainstorming
      - planning
      - translation
      - question_answering
  models:
    gpt-5:
      provider: openai
      api_key_env: OPENAI_API_KEY
      max_tokens: 128000
      cost_per_token: 3.0e-05
      priority: 2
      capabilities:
        - general
        - reasoning
        - coding
        - analysis
    claude-sonnet-4-6:
      provider: anthropic
      api_key_env: ANTHROPIC_API_KEY
      max_tokens: 1000000
      cost_per_token: 1.5e-05
      priority: 1
      capabilities:
        - reasoning
        - writing
        - analysis
  routing_rules:
    - condition: user_tier == 'enterprise'
      models:
        - claude-sonnet-4-6
        - gpt-5
      fallback: claude-sonnet-4-6
    - condition: query_type == 'code_generation'
      models:
        - gpt-5
      fallback: gpt-5
    - condition: query_type == 'analysis' AND token_count > 50000
      models:
        - claude-sonnet-4-6
        - gpt-5
      fallback: claude-sonnet-4-6

inference:
  openai:
    base_url: https://api.openai.com/v1
    timeout: 60
    max_retries: 3
  anthropic:
    base_url: https://api.anthropic.com
    timeout: 60
    max_retries: 3
  compression:
    enabled: true
    max_context_tokens: 100000
    compression_ratio: 0.3
    method: semantic_graph
  cache:
    enabled: true
    backend: redis
    ttl: 3600
    max_size: 1GB
    redis:
      host: redis
      port: 6379
      db: 0
      password_env: REDIS_PASSWORD
  batching:
    enabled: true
    max_batch_size: 32
    max_wait_time_ms: 50

kafka:
  bootstrap_servers:
    - kafka:29092
  topics:
    queries: llm-queries
    responses: llm-responses
    metrics: llm-metrics
    requests_raw: requests.raw
    inference_completed: inference.completed
    requests_enriched: requests.enriched
    fast_lane_hints: fast_lane_hints
    analytics_model_metrics_1m: analytics.model_metrics_1m
    alerts: alerts
    errors: llm-errors
  producer:
    acks: all
    retries: 3
    batch_size: 16384
    linger_ms: 5
    compression_type: gzip
  consumer:
    group_id: llm-router-consumer
    auto_offset_reset: latest
    enable_auto_commit: false
    max_poll_records: 500
  enabled: true

clickhouse:
  host: clickhouse
  port: 8123
  database: default
  username: llm_router
  password: llm_router_pass
  enabled: true

monitoring:
  prometheus_port: 8000
  prometheus:
    scrape_interval: 15s
    evaluation_interval: 15s
  grafana:
    port: 3000
    admin_user: admin
    admin_password: admin
  alerts:
    error_rate_threshold: 0.05
    latency_threshold_ms: 5000
    memory_usage_threshold: 0.9
    disk_usage_threshold: 0.8
  health_checks:
    interval_seconds: 30
    timeout_seconds: 10
  stream_metrics_staleness_seconds: 300
  enabled: false

slack:
  enabled: false
  bot_token_env: SLACK_BOT_TOKEN
  app_token_env: SLACK_APP_TOKEN
  signing_secret_env: SLACK_SIGNING_SECRET
  channels:
    - general
    - ai-testing
  response_settings:
    max_response_length: 2000
    typing_indicator: true
    thread_replies: true
  rate_limiting:
    requests_per_hour: 100
    burst_requests: 5
  state_backend: redis
  state_key_prefix: slack_state
  redis:
    host: redis
    port: 6379
    db: 2
    password_env: REDIS_PASSWORD

streamlit:
  enabled: false
  port: 8501
  host: 0.0.0.0
  theme: dark

flink:
  enabled: false
  job_manager_host: flink-jobmanager
  job_manager_port: 8081
  parallelism: 4
  checkpointing_interval_ms: 5000

policy_cache:
  enabled: false
  request_ttl_seconds: 300
  user_ttl_seconds: 900
  local_cache_ttl_seconds: 5
  redis:
    host: redis
    port: 6379
    db: 1
    key_prefix: routing_policy
  consumer:
    group_id: llm-router-policy-materializer

security:
  api_keys:
    enabled: true
    header_name: X-API-Key
    env_var: LLM_ROUTER_API_KEYS
  jwt:
    enabled: false
    secret_key_env: JWT_SECRET_KEY
    algorithm: HS256
    expiration_hours: 24
  cors:
    enabled: true
    allow_origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:8501
      - http://127.0.0.1:8501
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
    allow_headers:
      - '*'

performance:
  workers:
    api_workers: 1
    inference_workers: 1
    pipeline_workers: 1
  connection_pools:
    database:
      max_connections: 20
      min_connections: 5
    http:
      max_connections: 100
      timeout: 30
  memory:
    max_heap_size: 8G
    gc_strategy: G1GC

development:
  debug: false
  auto_reload: false
  profiling: false
  mock_external_apis: false

features:
  context_compression: true
  semantic_caching: true
  batch_processing: true
  multi_modal: false
  function_calling: true
  streaming_responses: true

pipeline:
  enabled: true
