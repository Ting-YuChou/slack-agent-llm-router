api:
  host: 0.0.0.0
  port: 8080
  log_level: info
  cors_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
    - http://localhost:8501
    - http://127.0.0.1:8501
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst_size: 100
    failure_mode: closed
    redis:
      host: redis
      port: 6379
      db: 4
      password_env: REDIS_PASSWORD
      key_prefix: api_gateway
    queue:
      enabled: true
      max_depth: 1000
      timeout_ms: 250
      poll_interval_ms: 25
    global_limits:
      active_requests: 100
      tokens_per_minute: 500000
      burst_tokens: 500000
    per_user:
      requests_per_minute: 60
      burst_size: 10
      tokens_per_minute: 80000
      burst_tokens: 80000
    by_tier:
      free:
        requests_per_minute: 30
        burst_size: 5
        tokens_per_minute: 30000
        burst_tokens: 30000
      premium:
        requests_per_minute: 120
        burst_size: 20
        tokens_per_minute: 150000
        burst_tokens: 150000
      enterprise:
        requests_per_minute: 300
        burst_size: 60
        tokens_per_minute: 400000
        burst_tokens: 400000
    providers:
      openai:
        active_requests: 40
        requests_per_minute: 600
        burst_size: 80
        tokens_per_minute: 300000
        burst_tokens: 300000
      anthropic:
        active_requests: 30
        requests_per_minute: 400
        burst_size: 60
        tokens_per_minute: 250000
        burst_tokens: 250000
    token_budget:
      enabled: true
      tokens_per_minute: 500000
      burst_tokens: 500000

logging:
  level: INFO
  file: logs/llm_router.log
  max_bytes: 10485760
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

router:
  default_model: gpt-5
  routing_strategy: intelligent
  fast_lane_models:
    - gpt-5
  scoring:
    reliability_weight: 40
    latency_weight: 20
    cost_weight_cap: 20
    priority_weight: 2
    context_fit_full_weight: 10
    context_fit_partial_weight: 5
    default_model_bonus: 4
    gpt5_default_bonus: 3
    sonnet_enterprise_bonus: 12
    sonnet_difficult_task_bonus: 10
    difficult_task_token_threshold: 50000
    local_simple_task_bonus: 0
    simple_task_token_threshold: 1200
    local_simple_task_types:
      - general
      - summarization
      - brainstorming
      - planning
      - translation
      - question_answering
  models:
    gpt-5:
      provider: openai
      api_key_env: OPENAI_API_KEY
      max_tokens: 128000
      cost_per_token: 3.0e-05
      priority: 2
      capabilities:
        - general
        - reasoning
        - coding
        - analysis
        - tool_use
        - web_search
    claude-sonnet-4-6:
      provider: anthropic
      api_key_env: ANTHROPIC_API_KEY
      max_tokens: 1000000
      cost_per_token: 1.5e-05
      priority: 1
      capabilities:
        - reasoning
        - writing
        - analysis
        - tool_use
        - web_search
  routing_rules:
    - condition: user_tier == 'enterprise'
      models:
        - claude-sonnet-4-6
        - gpt-5
      fallback: claude-sonnet-4-6
    - condition: query_type == 'code_generation'
      models:
        - gpt-5
      fallback: gpt-5
    - condition: query_type == 'analysis' AND token_count > 50000
      models:
        - claude-sonnet-4-6
        - gpt-5
      fallback: claude-sonnet-4-6
    - condition: query_type == 'web_research'
      models:
        - gpt-5
        - claude-sonnet-4-6
      fallback: gpt-5

inference:
  openai:
    base_url: https://api.openai.com/v1
    timeout: 60
    max_retries: 3
    prompt_cache:
      enabled: true
      key_strategy: conversation
      retention: in_memory
      pricing:
        cached_input_multiplier: 0.5
  anthropic:
    base_url: https://api.anthropic.com
    timeout: 60
    max_retries: 3
    prompt_cache:
      enabled: true
      cache_control:
        type: ephemeral
      pricing:
        cache_creation_input_multiplier: 1.25
        cache_read_input_multiplier: 0.1
  compression:
    enabled: true
    max_context_tokens: 100000
    compression_ratio: 0.3
    method: semantic_graph
  cache:
    enabled: true
    backend: redis
    ttl: 3600
    max_size: 1GB
    redis:
      host: redis
      port: 6379
      db: 0
      password_env: REDIS_PASSWORD
  batching:
    enabled: true
    max_batch_size: 32
    max_wait_time_ms: 50
  scheduler:
    enabled: true
    queue_enabled: true
    wait_timeout_ms: 250
    poll_interval_ms: 25
    failure_mode: closed
    allow_fallback_on_provider_rejection: true
    key_prefix: provider_scheduler
    retry:
      max_attempts_per_request: 3
      initial_backoff_ms: 100
      max_backoff_ms: 1000
      budget_enabled: true
      budget_tokens: 200
      budget_window_seconds: 60
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_ms: 30000
      half_open_max_requests: 1
      state_ttl_seconds: 3600

tools:
  web_search:
    enabled: false
    provider: tavily
    api_key_env: TAVILY_API_KEY
    base_url: https://api.tavily.com
    timeout_seconds: 5
    max_results: 5
    per_user_rate_limit: 20
    cache_ttl_seconds: 300
    search_depth: basic
    include_answer: false
    max_results_per_domain: 2
    blocked_domains: []
    freshness_days: 14

rag:
  enabled: false
  backend: redis_stack
  auto_retrieve: true
  default_knowledge_base_ids: []
  parser:
    provider: docling
    allow_cloud_fallback: false
    max_file_size_bytes: 100000000
    timeout_seconds: 300
    ocr_enabled: true
    ocr_languages: []
    table_structure_enabled: true
    converter_kwargs: {}
  chunking:
    strategy: hybrid
    chunk_size_tokens: 900
    chunk_overlap_tokens: 120
    repeat_table_headers: true
    max_chunk_chars: 6000
  embedding:
    provider: local_http
    model: BAAI/bge-m3
    dimensions: 1024
    timeout: 30
    url: http://host.docker.internal:8002/v1
    api_key_env: OPENAI_API_KEY
  redis:
    host: redis-stack
    port: 6379
    db: 0
    key_prefix: rag
    password_env: REDIS_PASSWORD
  ingestion_queue:
    enabled: false
    stream_key: rag:ingestion:stream
    group_name: rag-ingestion-workers
    dead_letter_stream_key: rag:ingestion:dead_letter
    retry_zset_key: rag:ingestion:retry
    consumer_count: 1
    concurrency: 1
    block_ms: 5000
    pending_idle_ms: 300000
    max_attempts: 3
    retry_backoff_seconds: 30
    stream_maxlen: 10000
  storage:
    staging_dir: /app/data/rag/uploads
    cleanup_completed_files: false
    completed_file_ttl_seconds: 86400
  retrieval:
    top_k: 5
    candidate_count: 30
    min_score: 0.0
    keyword_scorer: BM25STD
    keyword_score_normalization: max
    keyword_weight: 0.35
    vector_weight: 0.6
    recency_weight: 0.05
    max_context_chars: 6000
  rerank:
    enabled: false
    provider: sentence_transformers
    model: BAAI/bge-reranker-v2-m3
    top_n: 8
    timeout: 30
  visual:
    enabled: false
    required: false
    crop_dpi: 180
    min_crop_pixels: 64
    max_crops_per_document: 50
    ocr:
      enabled: false
      provider: paddleocr_vl
      model: PaddlePaddle/PaddleOCR-VL
      url:
      timeout: 30
    caption:
      enabled: false
      provider: qwen2_5_vl
      model: Qwen/Qwen2.5-VL-7B-Instruct
      url:
      timeout: 30
    embedding:
      enabled: false
      provider: nomic_multimodal
      model: nomic-ai/nomic-embed-multimodal-3b
      url:
      dimensions: 1024
      timeout: 30
    retrieval:
      top_k: 5
      weight: 0.4
      min_score: 0.0
    storage:
      assets_dir: data/rag/assets
  intent_gate:
    strong_terms:
      - academic calendar
      - admissions
      - advisor
      - attendance
      - campus
      - catalog
      - class schedule
      - curriculum
      - degree
      - department
      - dorm
      - enrollment
      - exam
      - faculty
      - financial aid
      - graduation
      - handbook
      - library
      - major
      - office hours
      - prerequisite
      - scholarship
      - school
      - semester
      - syllabus
      - transcript
      - tuition
      - university
      - 學生
      - 學校
      - 校園
      - 校曆
      - 課程
      - 選課
      - 註冊
      - 入學
      - 招生
      - 學費
      - 獎學金
      - 助學金
      - 退費
      - 宿舍
      - 圖書館
      - 系所
      - 學院
      - 教授
      - 老師
      - 辦公室時間
      - 成績單
      - 畢業
      - 學位
      - 主修
      - 先修
      - 考試
      - 期中
      - 期末
      - 手冊
      - 大綱
      - 文件
      - PDF
    context_terms:
      - course
      - document
      - file
      - form
      - handbook
      - policy
      - program
      - registration
      - schedule
      - pdf
      - 規定
      - 政策
      - 文件
      - 表格
      - 手冊
    school_context_terms:
      - academic
      - campus
      - class
      - college
      - course
      - department
      - faculty
      - school
      - student
      - university
      - 學校
      - 學生
      - 校園
      - 課程
      - 系所
      - 學院
      - 大學
    exclude_terms:
      - breaking
      - current
      - latest
      - news
      - now
      - price
      - release
      - stock
      - today
      - web
      - 最新
      - 今天
      - 現在
      - 新聞
      - 即時
      - 搜尋
      - 查詢網頁

kafka:
  bootstrap_servers:
    - kafka:29092
  topics:
    queries: llm-queries
    responses: llm-responses
    metrics: llm-metrics
    requests_raw: requests.raw
    inference_completed: inference.completed
    requests_enriched: requests.enriched
    fast_lane_hints: fast_lane_hints
    analytics_model_metrics_1m: analytics.model_metrics_1m
    routing_guardrails: routing.guardrails
    routing_policy_state: routing.policy_state
    alerts: alerts
    errors: llm-errors
  producer:
    acks: all
    retries: 3
    batch_size: 16384
    linger_ms: 5
    compression_type: gzip
    request_timeout_ms: 40000
    retry_backoff_ms: 100
    send_timeout_seconds: 40
    enable_idempotence: true
    wait_for_ack: true
    raise_on_failure: false
    health_failure_threshold: 5
  consumer:
    group_id: llm-router-consumer
    auto_offset_reset: latest
    enable_auto_commit: false
    max_poll_records: 500
    dlq_enabled: true
    supervisor_initial_backoff_seconds: 1
    supervisor_max_backoff_seconds: 30
  dlq:
    enabled: true
    topic_suffix: .dlq
    send_timeout_seconds: 10
  enabled: true

clickhouse:
  host: clickhouse
  port: 8123
  database: default
  username: llm_router
  password: llm_router_pass
  enabled: true

monitoring:
  prometheus_port: 8000
  prometheus:
    scrape_interval: 15s
    evaluation_interval: 15s
  grafana:
    port: 3000
    admin_user: admin
    admin_password: admin
  alerts:
    error_rate_threshold: 0.05
    latency_threshold_ms: 5000
    memory_usage_threshold: 0.9
    disk_usage_threshold: 0.8
  health_checks:
    interval_seconds: 30
    timeout_seconds: 10
  stream_metrics_staleness_seconds: 300
  enabled: false

slack:
  enabled: false
  bot_token_env: SLACK_BOT_TOKEN
  app_token_env: SLACK_APP_TOKEN
  signing_secret_env: SLACK_SIGNING_SECRET
  channels:
    - general
    - ai-testing
  response_settings:
    max_response_length: 2000
    typing_indicator: true
    thread_replies: true
  rate_limiting:
    requests_per_hour: 100
    burst_requests: 5
  context:
    enabled: true
    strategy: thread_first
    max_thread_messages: 20
    max_channel_messages: 10
    max_context_chars: 4000
    include_bot_messages: false
    timeout_seconds: 3
    fail_open: true
  state_backend: redis
  state_key_prefix: slack_state
  redis:
    host: redis
    port: 6379
    db: 2
    password_env: REDIS_PASSWORD
  memory:
    enabled: false
    backend: redis_stack
    key_prefix: slack_memory
    max_items_per_user: 500
    retention_days: 365
    search:
      max_results: 5
      max_context_chars: 2000
      max_item_chars: 500
      keyword_weight: 0.45
      vector_weight: 0.45
      recency_weight: 0.05
      importance_weight: 0.05
    embedding:
      provider: openai
      model: text-embedding-3-small
      dimensions: 1536
      timeout: 10
      api_key_env: OPENAI_API_KEY
    redis:
      host: redis-stack
      port: 6379
      db: 0
      key_prefix: slack_memory
      password_env: REDIS_PASSWORD
      dedicated_service_recommended: true

streamlit:
  enabled: false
  port: 8501
  host: 0.0.0.0
  theme: dark

flink:
  enabled: false
  job_manager_host: flink-jobmanager
  job_manager_port: 8081
  parallelism: 4
  checkpointing_interval_ms: 5000
  analytics:
    window_size_seconds: 60
    allowed_lateness_seconds: 15
    rolling_policy_window_seconds: 300
    anomaly_threshold_multiplier: 2.0
    guardrail_threshold_multiplier: 2.0
    watermark_out_of_orderness_seconds: 15
    model_guardrails:
      high_error_rate: 0.3
      high_latency_ms: 5000
      regression_error_rate_floor: 0.15
      regression_latency_floor_ms: 3500
      cache_hit_baseline_min: 0.15
      cache_hit_drop_ratio: 0.5
      cache_hit_min_request_count: 5
      throughput_baseline_min_qps: 0.2
      throughput_drop_ratio: 0.4
      throughput_min_request_count: 3
      cost_spike_ratio: 1.75
    provider_guardrails:
      high_error_rate: 0.2
      high_latency_ms: 6000
      regression_error_rate_floor: 0.1
      regression_latency_floor_ms: 4500
    rolling_policy:
      hot_request_count: 10
      warm_request_count: 4
      complex_total_tokens: 2400
      complex_reasoning_tokens: 1200
      moderate_total_tokens: 900
      moderate_latency_ms: 2500
      moderate_latency_min_tokens: 600
      enterprise_priority_request_count: 4
      burst_request_count: 10
      burst_min_avg_total_tokens: 400
      session_pin_min_success_count: 3
      user_pin_min_success_count: 4
      pin_min_share: 0.6
      expensive_model_min_count: 3
      expensive_model_min_share: 0.7
      free_high_cost_threshold_usd: 0.015
      paid_high_cost_threshold_usd: 0.03
      enterprise_medium_cost_threshold_usd: 0.05
      failing_model_min_count: 2
      failing_model_min_share: 0.6
      failing_provider_min_count: 2
      failing_provider_min_share: 0.7
      fast_lane_hit_rate_threshold: 0.6

policy_cache:
  enabled: false
  request_ttl_seconds: 300
  user_ttl_seconds: 900
  local_cache_ttl_seconds: 5
  redis:
    host: redis
    port: 6379
    db: 1
    key_prefix: routing_policy
  consumer:
    group_id: llm-router-policy-materializer

security:
  api_keys:
    enabled: true
    header_name: X-API-Key
    env_var: LLM_ROUTER_API_KEYS
  jwt:
    enabled: false
    secret_key_env: JWT_SECRET_KEY
    algorithm: HS256
    expiration_hours: 24
  cors:
    enabled: true
    allow_origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:8501
      - http://127.0.0.1:8501
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
    allow_headers:
      - '*'

performance:
  workers:
    api_workers: 1
    inference_workers: 1
    pipeline_workers: 1
  connection_pools:
    database:
      max_connections: 20
      min_connections: 5
    http:
      max_connections: 100
      timeout: 30
  memory:
    max_heap_size: 8G
    gc_strategy: G1GC

development:
  debug: false
  auto_reload: false
  profiling: false
  mock_external_apis: false

features:
  context_compression: true
  semantic_caching: true
  batch_processing: true
  multi_modal: false
  function_calling: true
  streaming_responses: true

pipeline:
  enabled: true
